<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>ToDo</title>
  </head>
  <body>
    <div id="backdrop" class="backdrop hidden" aria-hidden="true"></div>

    <div class="todo">
      <div class="tools">
        <div class="share">
          <button
            id="shareBtn"
            class="btn settings__btn"
            type="button"
            aria-label="Скопировать в буфер"
            aria-haspopup="dialog"
            aria-expanded="false"
          >
            <span class="icon-wrap">
              <i class="fa-solid fa-copy icon icon--share"></i>
              <i class="fa-solid fa-check icon icon--check"></i>  
            </span>
          </button>
        </div>
        <div class="todo__title">My Tasks</div>
        <div class="settings" aria-label="Настройки">
          <button
            id="settingsBtn"
            class="btn settings__btn"
            type="button"
            aria-label="Открыть настройки"
            aria-haspopup="dialog"
            aria-expanded="false"
          >
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
          </button>
          <div
            id="settingsPanel"
            class="settings__panel"
            role="dialog"
            aria-label="Настройки приложения"
          >
            <div class="settings__row">
              <label for="themeSelect" class="settings__label">Тема</label>
              <select id="themeSelect" class="settings__select">
                <option value="time">По времени</option>
                <option value="system">Система</option>
                <option value="dark">Тёмная</option>
                <option value="light">Светлая</option>
              </select>
            </div>
            <div class="settings__row">
              <label for="sortSelect" class="settings__label">Сортировка</label>
              <select id="sortSelect" class="settings__select">
                <option value="added">По порядку добавления</option>
                <option value="alpha">По алфавиту</option>
              </select>
            </div>
            <div class="settings__row">
              <label for="fontSelect" class="settings__label"
                >Размер шрифта</label
              >
              <select id="fontSelect" class="settings__select">
                <option value="16">Мелкий</option>
                <option value="20">Средний</option>
                <option value="24">Большой</option>
              </select>
            </div>
            <div class="settings__row">
              <label class="settings__label">Звук</label>
              <select id="soundToggle" class="settings__select">
                <option value="on">Вкл</option>
                <option value="off">Выкл</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <form class="form">
        <button
          id="clearChecksBtn"
          class="btn btn--primary"
          type="button"
          aria-label="Сбросить отметки"
        >
          <i class="fa-solid fa-rotate fa-xl"></i>
          
        </button>

        <input type="text" id="taskInput" placeholder="Добавить задачу..." />

        <button
          id="addBtn"
          class="btn btn--primary"
          type="submit"
          aria-label="Добавить задачу"
        >
          <i class="fa-solid fa-plus fa-xl"></i>
        </button>
      </form>
      <ul id="taskList" class="list" aria-label="Список задач"></ul>
      <p id="emptyState" class="empty-state hidden">
        Список пуст... Добавь первую задачу ➕
      </p>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
  </body>
</html>
